# CI + deploy in one workflow so the bytes that deploy are the bytes that
# passed the gates. The 2026-07-13 incident (DECISIONS.md D7) shipped a wasm
# build that no test had loaded: the old Deploy workflow rebuilt the wasm
# independently of CI and pushed it live unchecked. Now a single job builds
# the site once, tests that exact artifact, and the deploy job downloads and
# ships it, smoke-testing the artifact before the deploy and the live URL
# after.
name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Pinned so every build of the pair (JS glue + wasm) is produced by the
  # same toolchain everywhere: CI, deploy, and local builds should match.
  WASM_PACK_VERSION: v0.15.0
  PLAYWRIGHT_VERSION: '1.61'

jobs:
  ci:
    name: fmt / clippy / test / wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Install wasm-pack (pinned)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://github.com/rustwasm/wasm-pack/releases/download/${WASM_PACK_VERSION}/wasm-pack-${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz --strip-components=1 -C "$HOME/.local/bin" --wildcards '*/wasm-pack'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/wasm-pack" --version

      - name: wasm build
        run: ./scripts/build-wasm.sh

      # The JS half of the conformance suite: the built wasm boundary against
      # the ops fixtures, and the shipped view assembler against the
      # materialized fixtures (see scripts/conformance-web.mjs).
      - name: JS conformance (wasm boundary + view assembly)
        run: node scripts/conformance-web.mjs

      # The deploy job ships exactly these bytes; web/pkg is gitignored, so
      # the artifact is the only way the tested build reaches the deploy.
      - name: Upload site artifact for deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: web/
          if-no-files-found: error

  deploy:
    name: deploy tested artifact to Cloudflare Pages
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Only for scripts/smoke-live.mjs; the site itself comes from the
      # artifact, never from a rebuild.
      - uses: actions/checkout@v4

      # Secrets are not readable in job-level `if:` conditions, so probe them
      # in a step and gate the rest of the job on its output. CI must not go
      # red just because hosting is not provisioned.
      - name: Check Cloudflare secrets
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped: set the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets to enable Cloudflare Pages deploys."
          fi

      - name: Download tested site artifact
        if: steps.cf.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: Install Playwright (pinned)
        if: steps.cf.outputs.configured == 'true'
        run: |
          npm install --no-save --no-package-lock "playwright@${PLAYWRIGHT_VERSION}"
          npx playwright install --with-deps chromium

      # Gate: the artifact must pass the same smoke the live site will face.
      - name: Pre-deploy smoke (exact artifact)
        if: steps.cf.outputs.configured == 'true'
        run: node scripts/smoke-live.mjs --serve site

      - name: Deploy tested artifact to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=diffwtf

      # The check that was missing on 2026-07-13: load the DEPLOYED site and
      # assert the engine links, a diff renders, no errors, and the cache
      # policy from web/_headers is actually being served.
      - name: Post-deploy smoke (live URL)
        if: steps.cf.outputs.configured == 'true'
        run: node scripts/smoke-live.mjs https://diff.wtf
