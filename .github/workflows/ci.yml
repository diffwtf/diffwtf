# CI + deploy in one workflow so the bytes that deploy are the bytes that
# passed the gates. The 2026-07-13 incident (DECISIONS.md D7) shipped a wasm
# build that no test had loaded: the old Deploy workflow rebuilt the wasm
# independently of CI and pushed it live unchecked. Now a single job builds
# the site once, tests that exact artifact, and the deploy job downloads and
# ships it, smoke-testing the artifact before the deploy and the live URL
# after.
name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Pinned so every build of the pair (JS glue + wasm) is produced by the
  # same toolchain everywhere: CI, deploy, and local builds should match.
  WASM_PACK_VERSION: v0.15.0
  PLAYWRIGHT_VERSION: '1.61'

jobs:
  ci:
    name: fmt / clippy / test / wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Install wasm-pack (pinned)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://github.com/rustwasm/wasm-pack/releases/download/${WASM_PACK_VERSION}/wasm-pack-${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz --strip-components=1 -C "$HOME/.local/bin" --wildcards '*/wasm-pack'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/wasm-pack" --version

      - name: wasm build
        run: ./scripts/build-wasm.sh

      # The JS half of the conformance suite: the built wasm boundary against
      # the ops fixtures, and the shipped view assembler against the
      # materialized fixtures (see scripts/conformance-web.mjs).
      - name: JS conformance (wasm boundary + view assembly)
        run: node scripts/conformance-web.mjs

      # M11 gate (issue #11): every number on the home chart and the
      # benchmarks page must equal what the committed benchmark artifacts
      # generate; any drift fails here instead of shipping. Runs after the
      # wasm build because the page's engine-size claim is verified against
      # the built binary.
      - name: Benchmark pages match the committed artifacts
        run: node scripts/gen-bench-page.mjs --check

      - name: Install Playwright (pinned)
        run: |
          npm install --no-save --no-package-lock "playwright@${PLAYWRIGHT_VERSION}"
          npx playwright install --with-deps chromium

      # M12 gate: every fixture through both dispatch transports, plus the
      # worker-N then sync-N+1 stale-result ordering case.
      - name: Hybrid dispatch conformance (direct + worker)
        run: node scripts/conformance-dispatch.mjs --serve web

      # M10 gate: worker responsiveness, virtualized scroll correctness,
      # virtualized-vs-full render parity, and copy across recycled rows
      # (scripts/check-virtual.mjs, issue #16), against the same build the
      # deploy ships.
      - name: Virtualization and worker checks (Playwright)
        run: node scripts/check-virtual.mjs --serve web

      # M11 gate: the benchmarks page renders, its charts carry accessible
      # names and table fallbacks, the home page links to it, and neither
      # page makes an off-origin request (fonts aside).
      - name: Benchmarks page render check (Playwright)
        run: node scripts/check-bench-page.mjs --serve web

      # The deploy job ships exactly these bytes; web/pkg is gitignored, so
      # the artifact is the only way the tested build reaches the deploy.
      - name: Upload site artifact for deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: web/
          if-no-files-found: error

  deploy:
    name: deploy tested artifact to Cloudflare Pages
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Only for scripts/smoke-live.mjs; the site itself comes from the
      # artifact, never from a rebuild.
      - uses: actions/checkout@v4

      # Secrets are not readable in job-level `if:` conditions, so probe them
      # in a step and gate the rest of the job on its output. CI must not go
      # red just because hosting is not provisioned.
      - name: Check Cloudflare secrets
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped: set the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets to enable Cloudflare Pages deploys."
          fi

      - name: Download tested site artifact
        if: steps.cf.outputs.configured == 'true'
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      # Key every JS module URL in the artifact to this deploy (commit SHA),
      # so browser-cached JS can never be paired with a different deploy's
      # files no matter what TTL the zone stamps on .js responses
      # (scripts/stamp-site.mjs has the postmortem). Rewrites URL query
      # strings only; the pre-deploy smoke below revalidates the stamped
      # artifact end to end, and exactly these bytes deploy.
      - name: Stamp site with the deploy version
        if: steps.cf.outputs.configured == 'true'
        run: node scripts/stamp-site.mjs site "${GITHUB_SHA:0:8}"

      - name: Install Playwright (pinned)
        if: steps.cf.outputs.configured == 'true'
        run: |
          npm install --no-save --no-package-lock "playwright@${PLAYWRIGHT_VERSION}"
          npx playwright install --with-deps chromium

      # Gate: the artifact must pass the same smoke the live site will face.
      - name: Pre-deploy smoke (exact artifact)
        if: steps.cf.outputs.configured == 'true'
        run: node scripts/smoke-live.mjs --serve site --expect-stamp "${GITHUB_SHA:0:8}"

      # Preview-first promotion (2026-07-14 M10 incident follow-up): the
      # artifact deploys to a Pages PREVIEW branch, the full live smoke runs
      # against that preview URL over real hosting (module MIME types, the
      # worker chain, edge behavior), and only if it passes does the same
      # content-addressed artifact deploy to the production branch. Wrangler
      # has no alias-swap promote for Pages, but deploying identical files
      # twice is equivalent: uploads are deduplicated by content hash, so
      # the production deploy re-uploads nothing and just repoints the
      # production alias at bytes the preview already proved live.
      - name: Deploy tested artifact to Cloudflare Pages (preview)
        if: steps.cf.outputs.configured == 'true'
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.90.0'
          command: pages deploy site --project-name=diffwtf --branch=preview --commit-dirty=true

      # wrangler-action installs wrangler via npm in the workspace, and that
      # npm run prunes packages not in a package.json, which removes the
      # --no-save playwright installed above (this bit CI run 12). The
      # browser binaries under ~/.cache/ms-playwright survive, so
      # reinstalling the package is quick. Needed after every wrangler step.
      - name: Reinstall Playwright package (wrangler-action prunes node_modules)
        if: steps.cf.outputs.configured == 'true'
        run: npm install --no-save --no-package-lock "playwright@${PLAYWRIGHT_VERSION}"

      # The gate the M10 incident proved necessary: the first time a real
      # browser loads this deploy over real Pages hosting happens BEFORE
      # anything reaches the production alias.
      - name: Preview smoke (gate before promotion)
        if: steps.cf.outputs.configured == 'true'
        run: |
          PREVIEW_URL="${{ steps.preview.outputs.deployment-url }}"
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::wrangler-action returned no deployment-url for the preview deploy"
            exit 1
          fi
          node scripts/smoke-live.mjs "$PREVIEW_URL" --expect-stamp "${GITHUB_SHA:0:8}"

      - name: Promote to production (same artifact, production branch)
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.90.0'
          command: pages deploy site --project-name=diffwtf --branch=main --commit-dirty=true

      - name: Reinstall Playwright package (again, after the production wrangler step)
        if: steps.cf.outputs.configured == 'true'
        run: npm install --no-save --no-package-lock "playwright@${PLAYWRIGHT_VERSION}"

      # The check that was missing on 2026-07-13: load the DEPLOYED site and
      # assert the module graph, the engine and its worker, a rendered diff,
      # no errors, the HTML cache policy, and this exact deploy's stamp. The
      # smoke retries through the edge propagation window (the 2026-07-14
      # failure mode) before declaring the deploy dead.
      - name: Post-deploy smoke (live URL)
        if: steps.cf.outputs.configured == 'true'
        run: node scripts/smoke-live.mjs https://diff.wtf --expect-stamp "${GITHUB_SHA:0:8}"
