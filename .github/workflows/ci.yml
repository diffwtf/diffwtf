# CI: the four gates from CLAUDE.md on every push and PR.
# fmt, clippy, tests, and the wasm build must all be green.
name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: fmt / clippy / test / wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: wasm build
        run: ./scripts/build-wasm.sh

      # The JS half of the conformance suite: the built wasm boundary against
      # the ops fixtures, and the shipped view assembler against the
      # materialized fixtures (see scripts/conformance-web.mjs).
      - name: JS conformance (wasm boundary + view assembly)
        run: node scripts/conformance-web.mjs
