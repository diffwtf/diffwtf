# Publishes diffwtf-core to crates.io. Manual trigger only (workflow_dispatch),
# per the scaffold spec: manual approval is fine for v1.
#
# Auth uses crates.io Trusted Publishing (OIDC) via rust-lang/crates-io-auth-action:
# the job's GitHub OIDC token is exchanged for a short-lived crates.io token, so no
# long-lived secret is stored in the repo.
#
# SETUP REQUIRED on crates.io before this works: the diffwtf-core crate's
# Trusted Publishing settings must list this repository (diffwtf/diffwtf) and this
# workflow file name (publish.yml). Until that is configured, the fallback is a
# classic API token stored as the CARGO_REGISTRY_TOKEN repo secret; to use it,
# remove the auth step below and set
#   CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
# on the publish step instead.
name: Publish diffwtf-core

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required to mint the OIDC token that crates.io exchanges for a publish token.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish
        run: cargo publish -p diffwtf-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
