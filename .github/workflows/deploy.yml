# Deploys web/ to Cloudflare Pages (project: diffwtf) on every push to main.
#
# Guarded: if the CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets are not
# configured yet, the job emits a notice and skips the deploy steps instead of
# failing. CI must not go red just because hosting is not provisioned.
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Secrets are not readable in job-level `if:` conditions, so probe them in a
      # step and gate the rest of the job on its output.
      - name: Check Cloudflare secrets
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped: set the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets to enable Cloudflare Pages deploys."
          fi

      - name: Install Rust toolchain
        if: steps.cf.outputs.configured == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        if: steps.cf.outputs.configured == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        if: steps.cf.outputs.configured == 'true'
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build wasm
        if: steps.cf.outputs.configured == 'true'
        run: ./scripts/build-wasm.sh

      - name: Deploy web/ to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name=diffwtf
