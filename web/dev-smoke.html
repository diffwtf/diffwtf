<!doctype html>
<!--
  dev-smoke.html: developer smoke test for the wasm build. NOT the product
  shell, not part of the launch checklist, intentionally unstyled.

  Usage:
    ./scripts/build-wasm.sh
    python3 -m http.server        (from the REPO ROOT, not -d web: this page
                                   fetches ../fixtures/, which serving only
                                   web/ cannot provide)
    open http://localhost:8000/web/dev-smoke.html
-->
<meta charset="utf-8">
<title>diffwtf wasm dev smoke (not the product)</title>
<h1>diffwtf wasm smoke test (dev tool)</h1>
<p>
  Loads the wasm module, runs the bundled sample pair at word granularity,
  asserts the output deep-equals
  <code>fixtures/expected/sample-rust.word.json</code>, and dumps the
  DiffResult JSON plus the measured time below.
</p>
<pre id="status">loading engine...</pre>
<pre id="out"></pre>
<script type="module">
  import init, { compute } from './pkg/diffwtf_wasm.js';

  const statusEl = document.getElementById('status');
  const outEl = document.getElementById('out');

  // Strict structural equality: null !== undefined, missing key !== null.
  // Returns the path of the first mismatch, or null when equal.
  function firstMismatch(actual, expected, path) {
    if (Object.is(actual, expected)) return null;
    if (
      typeof actual !== 'object' || actual === null ||
      typeof expected !== 'object' || expected === null
    ) {
      return `${path}: got ${JSON.stringify(actual)}, expected ${JSON.stringify(expected)}`;
    }
    if (Array.isArray(actual) !== Array.isArray(expected)) {
      return `${path}: array vs non-array`;
    }
    if (Array.isArray(actual) && actual.length !== expected.length) {
      return `${path}: length ${actual.length}, expected ${expected.length}`;
    }
    for (const key of new Set([...Object.keys(actual), ...Object.keys(expected)])) {
      const err = firstMismatch(actual[key], expected[key], `${path}.${key}`);
      if (err) return err;
    }
    return null;
  }

  const fetchOk = async (url) => {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${url}: HTTP ${res.status}`);
    return res;
  };

  try {
    await init();
    const [left, right, expected] = await Promise.all([
      fetchOk('../fixtures/cases/sample-rust.left.txt').then((r) => r.text()),
      fetchOk('../fixtures/cases/sample-rust.right.txt').then((r) => r.text()),
      fetchOk('../fixtures/expected/sample-rust.word.json').then((r) => r.json()),
    ]);

    const t0 = performance.now();
    const result = compute(left, right, 'word');
    const ms = performance.now() - t0;

    const mismatch = firstMismatch(result, expected, '$');
    statusEl.textContent = [
      `engine loaded; compute(sample-rust, word) took ${ms.toFixed(3)} ms`,
      '(performance.now() around the wasm call, serialization included)',
      mismatch
        ? `FIDELITY CHECK FAILED at ${mismatch}`
        : 'fidelity check PASSED: output deep-equals sample-rust.word.json',
    ].join('\n');
    outEl.textContent = JSON.stringify(result, null, 2);
  } catch (err) {
    statusEl.textContent = `SMOKE TEST ERROR: ${err}`;
  }
</script>
